services:
  db:
    image: postgres:18-alpine
    container_name: fluxscribe-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: fluxscribe
      POSTGRES_USER: fluxscribe_user
      POSTGRES_PASSWORD: fluxscribe_password

    ports:
      - "5432:5432"

    volumes:
      - fluxscribe_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxscribe_user -d fluxscribe"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fluxscribe_db_data:
    external: false
